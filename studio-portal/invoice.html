<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice</title>
<link rel="stylesheet" href="css/style.css?v=8">
<style>
@media print {
  .no-print, button, a.btn { display: none !important; }
  body { background: white !important; padding: 0 !important; }
  .invoice-page { padding: 0 !important; }
  .invoice-doc { box-shadow: none !important; border: none !important; max-width: 100% !important; }
}
</style>
</head>
<body>

<div id="invoice-loading" class="auth-screen">
  <div style="text-align:center;color:rgba(255,255,255,0.6);">
    <div class="spinner" style="margin:0 auto 16px;border-color:rgba(255,255,255,0.2);border-top-color:var(--accent);"></div>
    Loading invoice…
  </div>
</div>

<div id="invoice-error" class="auth-screen" style="display:none;">
  <div class="auth-card" style="text-align:center;">
    <div style="font-size:40px;margin-bottom:16px;">🔒</div>
    <div class="auth-wordmark">Invoice Not Found</div>
    <div style="color:var(--text-mid);font-size:13.5px;margin-top:10px;line-height:1.65;" id="invoice-error-msg">
      This invoice link is invalid or has expired.
    </div>
  </div>
</div>

<div id="invoice-page" class="invoice-page" style="display:none;">
  <div style="max-width:680px;margin:0 auto 24px;display:flex;align-items:center;justify-content:space-between;">
    <div style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);">Studio<em style="color:var(--accent);font-style:italic;">.</em></div>
    <button class="theme-toggle" onclick="toggleTheme()" style="background:var(--surface);border:1px solid var(--border);color:var(--text-mid);width:36px;height:36px;">🌙</button>
  </div>

  <div class="invoice-doc">
    <!-- Header -->
    <div class="invoice-doc-header">
      <div>
        <div style="font-family:'DM Serif Display',serif;font-size:22px;color:#f0ece4;" id="inv-business-name">Studio.</div>
        <div style="font-size:12px;color:rgba(240,236,228,0.5);margin-top:4px;" id="inv-business-email"></div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:rgba(240,236,228,0.4);margin-bottom:6px;">Invoice</div>
        <div style="font-family:'DM Serif Display',serif;font-size:24px;color:var(--accent);" id="inv-number">#—</div>
      </div>
    </div>

    <div class="invoice-doc-body">
      <!-- Status banner -->
      <div id="inv-status-banner" style="margin-bottom:24px;"></div>

      <!-- Meta row -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;">
        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-mid);margin-bottom:6px;">Billed To</div>
          <div style="font-weight:500;font-size:14px;color:var(--text);" id="inv-client-name">—</div>
          <div style="font-size:13px;color:var(--text-mid);" id="inv-client-email">—</div>
        </div>
        <div style="text-align:right;">
          <div style="margin-bottom:8px;">
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-mid);margin-bottom:3px;">Issue Date</div>
            <div style="font-size:13px;color:var(--text);" id="inv-created">—</div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-mid);margin-bottom:3px;">Due Date</div>
            <div style="font-size:13px;" id="inv-due">—</div>
          </div>
        </div>
      </div>

      <!-- Line items -->
      <table class="invoice-line-table">
        <thead>
          <tr>
            <th style="width:50%;">Description</th>
            <th>Rate</th>
            <th>Qty</th>
            <th style="text-align:right;">Total</th>
          </tr>
        </thead>
        <tbody id="inv-line-items"></tbody>
        <tfoot>
          <tr>
            <td colspan="3" style="text-align:right;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-mid);">Subtotal</td>
            <td style="text-align:right;" id="inv-subtotal">—</td>
          </tr>
          <tr>
            <td colspan="3" style="text-align:right;font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);">Total Due</td>
            <td style="text-align:right;font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);" id="inv-total">—</td>
          </tr>
        </tfoot>
      </table>

      <!-- Notes -->
      <div id="inv-notes-section" style="display:none;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-mid);margin-bottom:8px;">Notes</div>
        <div style="font-size:13px;color:var(--text-mid);line-height:1.65;" id="inv-notes"></div>
      </div>

      <!-- Pay / Download -->
      <div style="margin-top:28px;display:flex;flex-direction:column;gap:10px;" id="inv-actions"></div>

      <!-- Amount paid -->
      <div id="inv-paid-section" style="display:none;margin-top:20px;padding:14px;background:var(--green-light);border-radius:var(--r);border:1px solid rgba(61,122,82,0.2);">
        <div style="font-size:13px;font-weight:600;color:var(--green);">✓ Payment received — thank you!</div>
        <div style="font-size:12px;color:var(--green);opacity:0.8;margin-top:3px;" id="inv-paid-date"></div>
      </div>

      <div style="text-align:center;margin-top:28px;padding-top:20px;border-top:1px solid var(--border);font-size:12px;color:var(--text-mid);">
        Thank you for your business.
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/client.js"></script>
<script src="js/invoice.js"></script>
</body>
</html>
